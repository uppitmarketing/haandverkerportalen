name: Brreg månedlig sync

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install node-fetch @supabase/supabase-js ws

      - name: Kjør Brreg-import
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node brreg_import_full.js

      - name: Trigger Netlify deploy
        run: |
          curl -X POST -d '{}' ${{ secrets.NETLIFY_DEPLOY_HOOK }}
